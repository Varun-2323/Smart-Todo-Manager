{% extends 'base.html' %}
{% load static %}

{% block title %}
Edit Task
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/add_task.css' %}">
{% endblock %}

{% block content %}

<div class="edit-task-container">
    <div class="task-box">

        <h2>Edit Task</h2>

        <form method="POST">

            {% csrf_token %}

            <label>Task Title</label>
            <input type="text" name="title" value="{{ task.title }}" required>

            <label>Description</label>
            <textarea name="description" rows="4" required>{{ task.description }}</textarea>

            <label>Priority</label>

            <select name="priority">

                <<option value="High" {% if task.priority=="High" %}selected{% endif %}>High</option>

                    <option value="Medium" {% if task.priority=="Medium" %}selected{% endif %}>Medium</option>

                    <option value="Low" {% if task.priority=="Low" %}selected{% endif %}>Low</option>

            </select>

            <label>Reminder Date</label>

            <input type="date" name="reminder_date" value="{{ task.reminder_date|date:'Y-m-d' }}" required>

            <label>Reminder Time</label>

            <input type="time" name="reminder_time" value="{{ task.reminder_time|time:'H:i' }}" required>

            <button type="submit">

                Update Task

            </button>

        </form>
    </div>
</div>

{% endblock %}
